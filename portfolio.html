  <style>
    /* Portfolio-specific styles */
    .portfolio-hero {
      height: 45vh;
      min-height: 350px;
      display: flex;
      align-items: flex-end;
      padding: 0 50px 60px;
      position: relative;
      background: var(--color-bg-light);
    }

    .portfolio-hero-content {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    .portfolio-hero h1 {
      font-family: var(--font-serif);
      font-size: 5rem;
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 15px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
    }

    .portfolio-hero .subtitle {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      line-height: 1.7;
      max-width: 500px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .portfolio-home-section {
      padding: 120px 50px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    .portfolio-home-section + .portfolio-home-section {
      border-top: 1px solid var(--color-border);
    }

    .home-section-header {
      margin-bottom: 60px;
    }

    .home-section-header h2 {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 300;
      margin-bottom: 10px;
    }

    .home-section-header p {
      color: var(--color-text-muted);
      font-size: 1rem;
      line-height: 1.7;
      max-width: 600px;
    }

    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .portfolio-grid .portfolio-item {
      display: block;
      text-decoration: none;
      color: var(--color-text);
      overflow: hidden;
    }

    .portfolio-grid .portfolio-item .img-wrap {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 4px;
    }

    .portfolio-grid .portfolio-item .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .portfolio-grid .portfolio-item:hover .img-wrap img {
      transform: scale(1.05);
    }

    .portfolio-grid .portfolio-item .item-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 18px 0 15px;
      border-bottom: 1px solid var(--color-border);
    }

    .portfolio-grid .portfolio-item .item-label h3 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 300;
    }

    .portfolio-grid .portfolio-item .item-label span {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* First item in each grid spans full width for a hero-style layout */
    .portfolio-grid > .portfolio-item:first-child {
      grid-column: 1 / -1;
    }

    .portfolio-grid > .portfolio-item:first-child .img-wrap {
      aspect-ratio: 16/9;
    }

    /* Back to home link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--color-text-muted);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color 0.3s;
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: var(--color-text);
    }

    .back-link svg {
      transform: rotate(180deg);
    }    /* Lightbox styles are now shared globally from src/style.css */

    /* Responsive */
    @media (max-width: 1024px) {
      .portfolio-hero h1 { font-size: 3.5rem; }
      .portfolio-grid { grid-template-columns: 1fr; }
      .portfolio-grid > .portfolio-item:first-child .img-wrap { aspect-ratio: 16/9; }
      .portfolio-grid .portfolio-item { cursor: pointer; }
    }

    @media (max-width: 768px) {
      .portfolio-hero { 
        padding: 120px 25px 40px; 
        height: auto; 
        min-height: 280px; 
        display: flex; 
        align-items: flex-end; 
      }
      .portfolio-hero h1 { font-size: 2.8rem; }
      .portfolio-home-section { padding: 80px 25px; }
      .home-section-header h2 { font-size: 2.2rem; }
      .back-link { font-size: 0.75rem; letter-spacing: 0.1em; }
      .lightbox-close { top: 20px; right: 20px; font-size: 0.8rem; }
      .lightbox-caption { bottom: 25px; font-size: 0.8rem; width: 90%; text-align: center; }
    }

    @media (max-width: 480px) {
      .portfolio-hero { padding-top: 100px; }
      .portfolio-hero h1 { font-size: 2.1rem; }
      .portfolio-hero .subtitle { font-size: 0.95rem; }
      .home-section-header h2 { font-size: 1.8rem; }
      .back-link span { display: none; } /* On very small screens, only show the back arrow to save space */
    }

    @media (max-height: 600px) {
      .portfolio-hero {
        padding-top: 100px !important;
        min-height: 200px !important;
        height: auto !important;
      }
    }

    /* Carousel / Slider Gallery styles */
    .portfolio-carousel-wrapper {
      grid-column: 1 / -1;
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      margin-top: 20px;
      /* No overflow:hidden here — arrows must not be clipped */
    }

    .portfolio-carousel-track {
      display: flex;
      gap: 30px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      width: 100%;
      padding: 15px 0;
      scrollbar-width: none;
    }

    .portfolio-carousel-track::-webkit-scrollbar {
      display: none;
    }

    .portfolio-carousel-track .portfolio-item {
      flex: 0 0 calc((100% - 60px) / 3);
      scroll-snap-align: start;
    }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1.5px solid rgba(197, 160, 89, 0.5);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 24px rgba(0,0,0,0.55), 0 0 0 1px rgba(197,160,89,0.15);
      opacity: 1;
    }

    .carousel-arrow svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.5;
    }

    .carousel-arrow:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background: rgba(10, 10, 10, 0.95);
      transform: translateY(-50%) scale(1.08);
      box-shadow: 0 6px 32px rgba(0,0,0,0.65), 0 0 0 2px rgba(197,160,89,0.35);
    }

    .carousel-arrow.prev {
      left: 12px;
    }

    .carousel-arrow.next {
      right: 12px;
    }

    /* Light Theme Adjustments */
    [data-theme="light"] .carousel-arrow {
      background: rgba(255, 255, 255, 0.92);
      color: #1a1a1a;
      box-shadow: 0 4px 24px rgba(0,0,0,0.18), 0 0 0 1px rgba(197,160,89,0.2);
    }

    [data-theme="light"] .carousel-arrow:hover {
      background: rgba(255, 255, 255, 1);
      color: var(--color-accent);
    }

    /* Responsive adjustments */
    @media (max-width: 1024px) {
      .portfolio-carousel-track .portfolio-item {
        flex: 0 0 calc((100% - 30px) / 2); /* 2 items visible */
      }
      .carousel-arrow.prev { left: 10px; }
      .carousel-arrow.next { right: 10px; }
    }

    @media (max-width: 768px) {
      .portfolio-carousel-track .portfolio-item {
        flex: 0 0 100%; /* 1 item visible */
      }
      .portfolio-carousel-track {
        gap: 15px;
      }
      .carousel-arrow {
        width: 44px;
        height: 44px;
      }
      .carousel-arrow svg { width: 18px; height: 18px; }
      .carousel-arrow.prev { left: 10px; }
      .carousel-arrow.next { right: 10px; }
    }

    @media (max-width: 480px) {
      .portfolio-carousel-track {
        gap: 10px;
      }
      .carousel-arrow {
        width: 38px;
        height: 38px;
      }
      .carousel-arrow svg { width: 16px; height: 16px; }
      .carousel-arrow.prev { left: 8px; }
      .carousel-arrow.next { right: 8px; }
    }
  </style>
</head>

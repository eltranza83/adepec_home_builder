<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="100%" height="100%">
  <defs>
    <!-- Gold gradient for digital display/printing -->
    <linearGradient id="gold-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5A059"/>
      <stop offset="50%" stop-color="#F1D7A7"/>
      <stop offset="100%" stop-color="#B28741"/>
    </linearGradient>
    
    <!-- Link the Syne font so it renders correctly -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;display=swap');
      .logo-main {
        font-family: 'Syne', -apple-system, sans-serif;
        font-weight: 800;
        font-size: 21px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        fill: #0a0a0a; /* Dark text for light backgrounds */
        text-anchor: middle;
      }
      .logo-sub {
        font-family: 'Syne', -apple-system, sans-serif;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        fill: #0a0a0a; /* Dark text for light backgrounds */
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- 1. The Gold House Logo Symbol (translateY adjusted to 24 to perfectly balance visual vertical spacing) -->
  <g transform="translate(50, 24) scale(1)">
    <path d="M50 15 L80 45 V85 H71 V45 L50 24 L29 45 V85 H20 V45 Z" fill="url(#gold-grad)"/>
    <path fill-rule="evenodd" d="M50 33.5 L66.5 50 V85 H50.5 V73 H49.5 V85 H33.5 V50 Z M50 42.5 L57.5 50 V63 H42.5 V50 Z" fill="url(#gold-grad)"/>
  </g>

  <!-- 2. ADEPEC Text -->
  <text x="100" y="145" class="logo-main">ADEPEC</text>

  <!-- 3. HOMES Text -->
  <text x="100" y="172" class="logo-sub">HOMES</text>
  
  <!-- Left horizontal gold bar (shifted left by 2px to balance the gaps visually based on font metrics) -->
  <line x1="22" y1="168" x2="61" y2="168" stroke="#C5A059" stroke-width="1.5"/>
  
  <!-- Right horizontal gold bar (shifted left by 2px to balance the gaps visually based on font metrics) -->
  <line x1="135" y1="168" x2="174" y2="168" stroke="#C5A059" stroke-width="1.5"/>
</svg>
